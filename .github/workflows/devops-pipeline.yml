name: DevOps CI/CD Pipeline

# El pipeline se ejecutará automáticamente con cada push o pull request en la rama main
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    name: Compilación y Pruebas Unitarias
    runs-on: ubuntu-latest

    steps:
      # 1. Descargar el código del repositorio en la máquina virtual del pipeline
      - name: Checkout del código
        uses: actions/checkout@v3

      # 2. Configurar el entorno de Java 17 necesario para Spring Boot
      - name: Configurar JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven # Guarda en caché las dependencias para que el pipeline corra más rápido en las siguientes ejecuciones

      # 3. Compilar el proyecto y ejecutar los Tests unitarios automáticos
      - name: Ejecutar Pruebas Unitarias con Maven
        run: mvn clean test